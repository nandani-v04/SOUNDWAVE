<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - SoundWave</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="bg-mesh"></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text">⚡ SoundWave</div>
      <div class="logo-subtitle" style="text-align:center;margin-top:4px">Admin Panel</div>
    </div>
    <h2 class="auth-title">Admin Login</h2>
    <p class="auth-subtitle">Sign in with your admin credentials</p>

    <div id="error-msg" style="display:none;background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.3);color:var(--error);padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:20px;font-size:13px;"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="admin@soundwave.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Admin password" required>
      </div>
      <button type="submit" class="btn btn-primary w-full" id="submit-btn">Sign In as Admin</button>
    </form>

    <div class="auth-footer" style="margin-top:20px">
      <a href="../login.html">← Back to user login</a>
    </div>

    <!-- Helper section for first-time setup -->
    <div style="margin-top:24px;padding:16px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border)">
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px">First Time Setup</div>
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">No admin account yet? Create one:</p>
      <div class="form-group" style="margin-bottom:10px">
        <input type="text" id="admin-name" class="form-input" placeholder="Admin name" style="font-size:12px;padding:8px 12px">
      </div>
      <div class="form-group" style="margin-bottom:10px">
        <input type="email" id="admin-email" class="form-input" placeholder="Admin email" style="font-size:12px;padding:8px 12px">
      </div>
      <div class="form-group" style="margin-bottom:10px">
        <input type="password" id="admin-pwd" class="form-input" placeholder="Admin password" style="font-size:12px;padding:8px 12px">
      </div>
      <div class="form-group" style="margin-bottom:10px">
        <input type="text" id="admin-secret" class="form-input" placeholder="Admin secret key (from .env)" style="font-size:12px;padding:8px 12px">
      </div>
      <button class="btn btn-secondary w-full" style="font-size:12px;padding:8px" onclick="createAdmin()">Create Admin Account</button>
    </div>
  </div>
</div>
<div class="toast-container" id="toast-container"></div>
<script src="../js/api.js"></script>
<script>
  // If already logged in as admin, redirect
  if (Storage.isLoggedIn() && Storage.isAdmin()) {
    window.location.href = 'index.html';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submit-btn');
    const errorEl = document.getElementById('error-msg');

    btn.textContent = 'Signing in...';
    btn.disabled = true;
    errorEl.style.display = 'none';

    try {
      const data = await AuthAPI.login(email, password);
      if (data.user.role !== 'admin') {
        throw new Error('This account does not have admin access.');
      }
      Storage.saveUser(data.token, data.user);
      showToast('Welcome, Admin! 🔐', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    } catch(e) {
      errorEl.textContent = e.message;
      errorEl.style.display = 'block';
      btn.textContent = 'Sign In as Admin';
      btn.disabled = false;
    }
  }

  async function createAdmin() {
    const name = document.getElementById('admin-name').value.trim();
    const email = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-pwd').value;
    const secret = document.getElementById('admin-secret').value.trim();

    if (!name || !email || !password || !secret) {
      showToast('Please fill all admin creation fields', 'error');
      return;
    }

    try {
      const data = await AuthAPI.createAdmin(name, email, password, secret);
      Storage.saveUser(data.token, data.user);
      showToast('Admin account created!', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    } catch(e) {
      showToast(e.message, 'error');
    }
  }
</script>
</body>
</html>
