<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - SoundWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-mesh"></div>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-text">⚡ SoundWave</div><div class="logo-subtitle">Feel the rhythm</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Discover</div>
        <a href="index.html" class="nav-link">🏠 Home</a>
        <a href="search.html" class="nav-link">🔍 Search</a>
        <a href="player.html" class="nav-link">▶️ Now Playing</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Library</div>
        <a href="playlists.html" class="nav-link">📋 Playlists</a>
        <a href="liked.html" class="nav-link">❤️ Liked Songs</a>
        <a href="recent.html" class="nav-link">⏱ Recently Played</a>
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-card" onclick="window.location.href='profile.html'">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-info"><div class="user-name" id="sidebar-name">Guest</div></div>
      </div>
      <button class="btn btn-secondary btn-sm w-full" style="margin-top:8px" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page">
      <!-- Profile header -->
      <div class="profile-header">
        <div class="profile-avatar" id="profile-avatar" style="position:relative;cursor:pointer" onclick="document.getElementById('avatar-input').click()">
          <span id="profile-initials">?</span>
          <div style="position:absolute;inset:0;background:rgba(0,0,0,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s"
               onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">📷</div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
        <div>
          <div class="profile-name" id="profile-name">Loading...</div>
          <div class="profile-email" id="profile-email"></div>
          <div class="profile-stats">
            <div class="profile-stat"><div class="profile-stat-value" id="stat-liked">0</div><div class="profile-stat-label">Liked</div></div>
            <div class="profile-stat"><div class="profile-stat-value" id="stat-playlists">0</div><div class="profile-stat-label">Playlists</div></div>
            <div class="profile-stat"><div class="profile-stat-value" id="stat-recent">0</div><div class="profile-stat-label">Played</div></div>
          </div>
        </div>
        <button class="btn btn-secondary" onclick="openEditModal()" style="margin-left:auto">✏️ Edit Profile</button>
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0">
        <button class="tab-btn active" onclick="showTab('liked')" id="tab-liked" style="padding:10px 20px;background:none;border:none;color:var(--accent-light);font-weight:600;cursor:pointer;border-bottom:2px solid var(--accent);font-family:var(--font-body)">❤️ Liked Songs</button>
        <button class="tab-btn" onclick="showTab('recent')" id="tab-recent" style="padding:10px 20px;background:none;border:none;color:var(--text-secondary);font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--font-body)">⏱ Recent</button>
        <button class="tab-btn" onclick="showTab('settings')" id="tab-settings" style="padding:10px 20px;background:none;border:none;color:var(--text-secondary);font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:var(--font-body)">⚙️ Settings</button>
      </div>

      <!-- Liked songs tab -->
      <div id="tab-liked-content">
        <div id="liked-list" class="song-list"></div>
      </div>

      <!-- Recent tab -->
      <div id="tab-recent-content" style="display:none">
        <div id="recent-list" class="song-list"></div>
      </div>

      <!-- Settings tab -->
      <div id="tab-settings-content" style="display:none">
        <div class="card" style="max-width:500px">
          <h3 style="font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:20px">Change Password</h3>
          <div class="form-group">
            <label class="form-label">Current Password</label>
            <input type="password" id="current-pwd" class="form-input" placeholder="Enter current password">
          </div>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" id="new-pwd" class="form-input" placeholder="At least 6 characters">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" id="confirm-pwd" class="form-input" placeholder="Re-enter new password">
          </div>
          <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Player bar -->
<div class="player-bar">
  <div class="player-song-info">
    <div class="player-thumb" id="player-thumb">🎵</div>
    <div>
      <div class="player-song-title" id="player-title">No song selected</div>
      <div class="player-song-artist" id="player-artist">—</div>
    </div>
    <button class="player-like-btn" id="player-like-btn" onclick="if(Player.currentSong)toggleLike(Player.currentSong._id)">🤍</button>
  </div>
  <div class="player-controls">
    <div class="player-buttons">
      <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()">🔀</button>
      <button class="ctrl-btn" onclick="playPrevious()">⏮</button>
      <button class="play-pause-btn" id="play-pause-btn" onclick="togglePlayPause()">▶</button>
      <button class="ctrl-btn" onclick="playNext()">⏭</button>
      <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()">🔁</button>
    </div>
    <div class="player-progress">
      <span class="time-label" id="time-current">0:00</span>
      <div class="progress-bar-wrap" id="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="time-label" id="time-duration">0:00</span>
    </div>
  </div>
  <div class="player-right">
    🔊 <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80">
  </div>
</div>

<!-- Edit profile modal -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal">
    <h3 class="modal-title">Edit Profile</h3>
    <div class="form-group">
      <label class="form-label">Display Name</label>
      <input type="text" id="edit-name" class="form-input" placeholder="Your name">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/player.js"></script>
<script>
  if (!Storage.isLoggedIn()) window.location.href = 'login.html';

  const user = Storage.getUser();

  function logout() {
    Storage.logout();
    window.location.href = 'login.html';
  }

  function showTab(tab) {
    ['liked','recent','settings'].forEach(t => {
      document.getElementById(`tab-${t}-content`).style.display = t === tab ? 'block' : 'none';
      const btn = document.getElementById(`tab-${t}`);
      btn.style.color = t === tab ? 'var(--accent-light)' : 'var(--text-secondary)';
      btn.style.borderBottom = t === tab ? '2px solid var(--accent)' : '2px solid transparent';
    });
  }

  async function loadProfile() {
    try {
      const data = await UsersAPI.getProfile();
      const u = data.user;

      document.getElementById('profile-name').textContent = u.name;
      document.getElementById('profile-email').textContent = u.email;
      document.getElementById('sidebar-name').textContent = u.name;
      document.getElementById('sidebar-avatar').textContent = getInitials(u.name);

      const initials = document.getElementById('profile-initials');
      if (u.profilePicture) {
        const avatarEl = document.getElementById('profile-avatar');
        initials.innerHTML = `<img src="${getImageUrl(u.profilePicture)}" alt="${u.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      } else {
        initials.textContent = getInitials(u.name);
      }

      document.getElementById('stat-liked').textContent = u.likedSongs?.length || 0;
      document.getElementById('edit-name').value = u.name;
    } catch(e) { showToast('Error loading profile', 'error'); }
  }

  async function loadLikedSongs() {
    try {
      const data = await UsersAPI.getLikedSongs();
      const el = document.getElementById('liked-list');
      const songs = data.likedSongs || [];
      document.getElementById('stat-liked').textContent = songs.length;

      if (!songs.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🤍</div><div class="empty-state-title">No liked songs</div><p class="empty-state-text">Heart songs you love from the home page</p></div>';
        return;
      }
      el.innerHTML = songs.map((s, i) => createSongListItem(s, i, songs)).join('');
    } catch(e) { showToast('Error loading liked songs', 'error'); }
  }

  async function loadRecentlyPlayed() {
    try {
      const data = await UsersAPI.getRecentlyPlayed();
      const el = document.getElementById('recent-list');
      const items = data.recentlyPlayed || [];
      document.getElementById('stat-recent').textContent = items.length;

      if (!items.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏱</div><div class="empty-state-title">Nothing played yet</div><p class="empty-state-text">Start listening to songs!</p></div>';
        return;
      }
      const songs = items.map(i => i.song);
      el.innerHTML = songs.map((s, i) => createSongListItem(s, i, songs)).join('');
    } catch(e) {}
  }

  async function loadPlaylistCount() {
    try {
      const data = await PlaylistsAPI.getAll();
      document.getElementById('stat-playlists').textContent = data.playlists?.length || 0;
    } catch(e) {}
  }

  async function uploadAvatar(input) {
    if (!input.files?.[0]) return;
    const formData = new FormData();
    formData.append('profilePicture', input.files[0]);
    try {
      const data = await UsersAPI.uploadProfilePicture(formData);
      const user = Storage.getUser();
      user.profilePicture = data.profilePicture;
      Storage.saveUser(Storage.getToken(), user);
      showToast('Profile picture updated!', 'success');
      location.reload();
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openEditModal() { document.getElementById('edit-modal').classList.remove('hidden'); }
  function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }

  async function saveProfile() {
    const name = document.getElementById('edit-name').value.trim();
    if (!name) { showToast('Name is required', 'error'); return; }
    try {
      const data = await UsersAPI.updateProfile(name);
      const u = Storage.getUser();
      u.name = name;
      Storage.saveUser(Storage.getToken(), u);
      showToast('Profile updated!', 'success');
      closeEditModal();
      document.getElementById('profile-name').textContent = name;
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function changePassword() {
    const cur = document.getElementById('current-pwd').value;
    const newP = document.getElementById('new-pwd').value;
    const conf = document.getElementById('confirm-pwd').value;

    if (!cur || !newP || !conf) { showToast('Please fill all fields', 'error'); return; }
    if (newP !== conf) { showToast('New passwords do not match', 'error'); return; }
    if (newP.length < 6) { showToast('New password must be at least 6 characters', 'error'); return; }

    try {
      await UsersAPI.changePassword(cur, newP);
      showToast('Password changed successfully!', 'success');
      document.getElementById('current-pwd').value = '';
      document.getElementById('new-pwd').value = '';
      document.getElementById('confirm-pwd').value = '';
    } catch(e) { showToast(e.message, 'error'); }
  }

  loadProfile();
  loadLikedSongs();
  loadRecentlyPlayed();
  loadPlaylistCount();
</script>
</body>
</html>
