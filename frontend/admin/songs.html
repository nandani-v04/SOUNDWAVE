<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Songs - SoundWave Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-sidebar { width: 220px; background: var(--bg-secondary); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; height: 100vh; display: flex; flex-direction: column; z-index: 100; }
    .admin-logo { padding: 20px; border-bottom: 1px solid var(--border); }
    .admin-nav { flex: 1; padding: 16px 10px; }
    .admin-nav a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: var(--text-secondary); font-size: 13px; font-weight: 500; margin-bottom: 2px; text-decoration: none; transition: all 0.2s; }
    .admin-nav a:hover { background: var(--bg-card); color: var(--text-primary); }
    .admin-nav a.active { background: var(--accent-glow); color: var(--accent-light); }
    .admin-bottom { padding: 16px 10px; border-top: 1px solid var(--border); }
    .admin-main { margin-left: 220px; padding: 32px; flex: 1; }
    .table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; overflow-x: auto; }
  </style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-logo">
      <div class="logo-text">⚡ SoundWave</div>
      <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin-top:2px">Admin Panel</div>
    </div>
    <nav class="admin-nav">
      <a href="index.html">📊 Dashboard</a>
      <a href="upload.html">⬆️ Upload Song</a>
      <a href="songs.html" class="active">🎵 Manage Songs</a>
      <a href="users.html">👥 Users</a>
    </nav>
    <div class="admin-bottom">
      <button class="btn btn-secondary btn-sm w-full" onclick="logout()">Sign Out</button>
      <a href="../index.html" class="btn btn-secondary btn-sm w-full" style="margin-top:6px;display:flex">← User View</a>
    </div>
  </aside>

  <main class="admin-main">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <div>
        <h1 style="font-family:var(--font-display);font-size:26px;font-weight:800">Manage Songs</h1>
        <p style="color:var(--text-secondary);font-size:13px;margin-top:4px" id="songs-count">Loading...</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="search-bar" style="max-width:250px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="table-search" placeholder="Filter songs..." oninput="filterTable(this.value)">
        </div>
        <a href="upload.html" class="btn btn-primary">+ Upload</a>
      </div>
    </div>

    <div class="table-wrap">
      <table class="data-table" id="songs-table">
        <thead>
          <tr>
            <th style="width:50px">#</th>
            <th>Song</th>
            <th>Artist</th>
            <th>Genre</th>
            <th>Plays</th>
            <th>Likes</th>
            <th>Date Added</th>
            <th style="width:140px">Actions</th>
          </tr>
        </thead>
        <tbody id="songs-tbody">
          <tr><td colspan="8" style="text-align:center;padding:32px"><div class="spinner" style="margin:0 auto"></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Edit modal -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal">
    <h3 class="modal-title">Edit Song</h3>
    <input type="hidden" id="edit-song-id">
    <div class="form-group">
      <label class="form-label">Title</label>
      <input type="text" id="edit-title" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Artist</label>
      <input type="text" id="edit-artist" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Genre</label>
      <input type="text" id="edit-genre" class="form-input">
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveSong()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../js/api.js"></script>
<script>
  if (!Storage.isLoggedIn() || !Storage.isAdmin()) window.location.href = 'login.html';

  function logout() { Storage.logout(); window.location.href = 'login.html'; }

  let allSongs = [];

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function loadSongs() {
    try {
      const data = await AdminAPI.getAllSongs();
      allSongs = data.songs || [];
      document.getElementById('songs-count').textContent = `${allSongs.length} songs in library`;
      renderTable(allSongs);
    } catch(e) {
      document.getElementById('songs-tbody').innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--error);padding:24px">${e.message}</td></tr>`;
    }
  }

  function renderTable(songs) {
    const tbody = document.getElementById('songs-tbody');
    if (!songs.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:32px">No songs found</td></tr>';
      return;
    }

    tbody.innerHTML = songs.map((song, i) => `
      <tr id="row-${song._id}">
        <td style="color:var(--text-muted)">${i+1}</td>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:40px;height:40px;border-radius:6px;overflow:hidden;background:var(--bg-secondary);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px">
              ${song.thumbnail ? `<img src="http://localhost:5000${song.thumbnail}" style="width:100%;height:100%;object-fit:cover" alt="">` : '🎵'}
            </div>
            <div>
              <div style="font-size:13px;font-weight:500">${escapeHtml(song.title)}</div>
              <div style="font-size:11px;color:var(--text-muted)">${song.filePath?.split('/').pop() || ''}</div>
            </div>
          </div>
        </td>
        <td style="color:var(--text-secondary);font-size:13px">${escapeHtml(song.artist)}</td>
        <td><span class="badge badge-accent">${escapeHtml(song.genre)}</span></td>
        <td style="color:var(--text-secondary);font-size:13px">${formatNumber(song.playCount)}</td>
        <td style="color:var(--text-secondary);font-size:13px">${song.likes?.length || 0} ❤️</td>
        <td style="color:var(--text-muted);font-size:12px">${new Date(song.createdAt).toLocaleDateString()}</td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-secondary btn-sm" onclick='openEditModal(${JSON.stringify(song)})'>✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSong('${song._id}','${escapeHtml(song.title)}')">🗑️</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function filterTable(query) {
    if (!query.trim()) { renderTable(allSongs); return; }
    const q = query.toLowerCase();
    const filtered = allSongs.filter(s =>
      s.title?.toLowerCase().includes(q) ||
      s.artist?.toLowerCase().includes(q) ||
      s.genre?.toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  function openEditModal(song) {
    document.getElementById('edit-song-id').value = song._id;
    document.getElementById('edit-title').value = song.title;
    document.getElementById('edit-artist').value = song.artist;
    document.getElementById('edit-genre').value = song.genre;
    document.getElementById('edit-modal').classList.remove('hidden');
  }

  function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }

  async function saveSong() {
    const id = document.getElementById('edit-song-id').value;
    const title = document.getElementById('edit-title').value.trim();
    const artist = document.getElementById('edit-artist').value.trim();
    const genre = document.getElementById('edit-genre').value.trim();

    if (!title || !artist || !genre) { showToast('All fields are required', 'error'); return; }

    try {
      await AdminAPI.editSong(id, { title, artist, genre });
      showToast('Song updated!', 'success');
      closeEditModal();
      loadSongs();
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function deleteSong(id, title) {
    if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
    try {
      await AdminAPI.deleteSong(id);
      showToast(`"${title}" deleted`, 'info');
      document.getElementById(`row-${id}`)?.remove();
      allSongs = allSongs.filter(s => s._id !== id);
      document.getElementById('songs-count').textContent = `${allSongs.length} songs in library`;
    } catch(e) { showToast(e.message, 'error'); }
  }

  loadSongs();
</script>
</body>
</html>
