<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recently Played - SoundWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-mesh"></div>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-text">⚡ SoundWave</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <a href="index.html" class="nav-link">🏠 Home</a>
        <a href="search.html" class="nav-link">🔍 Search</a>
        <a href="player.html" class="nav-link">▶️ Now Playing</a>
      </div>
      <div class="nav-section">
        <a href="playlists.html" class="nav-link">📋 Playlists</a>
        <a href="liked.html" class="nav-link">❤️ Liked Songs</a>
        <a href="recent.html" class="nav-link active">⏱ Recently Played</a>
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-card" onclick="window.location.href='profile.html'">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-info"><div class="user-name" id="sidebar-name">Guest</div></div>
      </div>
    </div>
  </aside>
  <main class="main-content">
    <div class="page">
      <div class="page-header">
        <div>
          <h1 class="page-title">⏱ Recently Played</h1>
          <p class="page-subtitle">Your listening history</p>
        </div>
      </div>
      <div class="song-list" id="recent-list">
        <div class="loading-container"><div class="spinner"></div></div>
      </div>
    </div>
  </main>
</div>
<div class="player-bar">
  <div class="player-song-info">
    <div class="player-thumb" id="player-thumb">🎵</div>
    <div><div class="player-song-title" id="player-title">No song</div><div class="player-song-artist" id="player-artist">—</div></div>
    <button class="player-like-btn" id="player-like-btn">🤍</button>
  </div>
  <div class="player-controls">
    <div class="player-buttons">
      <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()">🔀</button>
      <button class="ctrl-btn" onclick="playPrevious()">⏮</button>
      <button class="play-pause-btn" id="play-pause-btn" onclick="togglePlayPause()">▶</button>
      <button class="ctrl-btn" onclick="playNext()">⏭</button>
      <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()">🔁</button>
    </div>
    <div class="player-progress">
      <span class="time-label" id="time-current">0:00</span>
      <div class="progress-bar-wrap" id="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="time-label" id="time-duration">0:00</span>
    </div>
  </div>
  <div class="player-right">🔊 <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80"></div>
</div>
<div class="toast-container" id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/player.js"></script>
<script>
  if (!Storage.isLoggedIn()) window.location.href = 'login.html';
  const user = Storage.getUser();
  if (user) { document.getElementById('sidebar-name').textContent = user.name; document.getElementById('sidebar-avatar').textContent = getInitials(user.name); }

  async function load() {
    try {
      const data = await UsersAPI.getRecentlyPlayed();
      const el = document.getElementById('recent-list');
      const items = data.recentlyPlayed || [];
      if (!items.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏱</div><div class="empty-state-title">Nothing here yet</div><p class="empty-state-text">Start playing songs!</p></div>';
        return;
      }
      const songs = items.map(i => i.song);
      el.innerHTML = items.map((item, i) => {
        const s = item.song;
        const when = new Date(item.playedAt).toLocaleString();
        return `
          <div class="song-list-item" onclick="playSong(${JSON.stringify(s).replace(/"/g,'&quot;')}, ${JSON.stringify(songs).replace(/"/g,'&quot;')})">
            <span class="song-list-num">${i+1}</span>
            <div class="song-list-thumb">${s.thumbnail ? `<img src="${getImageUrl(s.thumbnail)}" alt="">` : '🎵'}</div>
            <div class="song-list-info">
              <div class="song-list-title">${escapeHtml(s.title)}</div>
              <div class="song-list-artist">${escapeHtml(s.artist)}</div>
            </div>
            <span style="font-size:11px;color:var(--text-muted);flex-shrink:0">${when}</span>
          </div>
        `;
      }).join('');
    } catch(e) { document.getElementById('recent-list').innerHTML = `<p style="color:var(--error)">${e.message}</p>`; }
  }
  load();
</script>
</body>
</html>
