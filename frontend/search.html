<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - SoundWave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-mesh"></div>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-text">⚡ SoundWave</div><div class="logo-subtitle">Feel the rhythm</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Discover</div>
        <a href="index.html" class="nav-link">🏠 Home</a>
        <a href="search.html" class="nav-link active">🔍 Search</a>
        <a href="player.html" class="nav-link">▶️ Now Playing</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Library</div>
        <a href="playlists.html" class="nav-link">📋 Playlists</a>
        <a href="liked.html" class="nav-link">❤️ Liked Songs</a>
        <a href="recent.html" class="nav-link">⏱ Recently Played</a>
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-card" onclick="window.location.href='profile.html'">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-info"><div class="user-name" id="sidebar-name">Guest</div></div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page">
      <div class="page-header">
        <div>
          <h1 class="page-title">Search</h1>
          <p class="page-subtitle">Find songs, artists, genres</p>
        </div>
      </div>

      <!-- Big search bar -->
      <div class="search-bar" style="max-width:600px;margin-bottom:32px;padding:14px 22px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search songs, artists, genres..." autofocus
               oninput="debounceSearch(this.value)">
        <button onclick="clearSearch()" id="clear-btn" style="background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;display:none">✕</button>
      </div>

      <!-- Genre filter chips -->
      <div id="genre-chips" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px"></div>

      <!-- Search results -->
      <div id="search-state">
        <!-- Default: show genres/categories -->
        <div id="default-view">
          <h2 class="section-title" style="margin-bottom:16px">Browse by Genre</h2>
          <div class="songs-grid" id="genre-grid"></div>

          <h2 class="section-title" style="margin:32px 0 16px">All Songs</h2>
          <div class="songs-grid" id="all-songs-grid">
            <div class="loading-container"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Results view -->
        <div id="results-view" style="display:none">
          <div class="section-header">
            <h2 class="section-title" id="results-title">Results</h2>
          </div>
          <div class="songs-grid" id="results-grid"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Player bar -->
<div class="player-bar">
  <div class="player-song-info">
    <div class="player-thumb" id="player-thumb">🎵</div>
    <div>
      <div class="player-song-title" id="player-title">No song selected</div>
      <div class="player-song-artist" id="player-artist">—</div>
    </div>
    <button class="player-like-btn" id="player-like-btn" onclick="if(Player.currentSong)toggleLike(Player.currentSong._id)">🤍</button>
  </div>
  <div class="player-controls">
    <div class="player-buttons">
      <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()">🔀</button>
      <button class="ctrl-btn" onclick="playPrevious()">⏮</button>
      <button class="play-pause-btn" id="play-pause-btn" onclick="togglePlayPause()">▶</button>
      <button class="ctrl-btn" onclick="playNext()">⏭</button>
      <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()">🔁</button>
    </div>
    <div class="player-progress">
      <span class="time-label" id="time-current">0:00</span>
      <div class="progress-bar-wrap" id="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="time-label" id="time-duration">0:00</span>
    </div>
  </div>
  <div class="player-right">
    🔊 <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80">
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/player.js"></script>
<script>
  let allSongs = [];
  let searchTimer = null;
  const GENRE_COLORS = ['#7c5cbf','#e05c8a','#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];

  const user = Storage.getUser();
  if (user) {
    document.getElementById('sidebar-name').textContent = user.name;
    document.getElementById('sidebar-avatar').textContent = getInitials(user.name);
  }

  // Debounce: wait 400ms after user stops typing before searching
  function debounceSearch(val) {
    clearTimeout(searchTimer);
    document.getElementById('clear-btn').style.display = val ? 'block' : 'none';
    if (!val.trim()) { showDefaultView(); return; }
    searchTimer = setTimeout(() => performSearch(val), 400);
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('clear-btn').style.display = 'none';
    showDefaultView();
  }

  async function performSearch(query) {
    document.getElementById('default-view').style.display = 'none';
    document.getElementById('results-view').style.display = 'block';
    document.getElementById('results-title').textContent = `Results for "${query}"`;
    document.getElementById('results-grid').innerHTML = '<div class="loading-container"><div class="spinner"></div></div>';

    try {
      const data = await SongsAPI.search(query);
      const grid = document.getElementById('results-grid');

      if (!data.songs?.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🔍</div><div class="empty-state-title">No results for "${escapeHtml(query)}"</div><p class="empty-state-text">Try a different search term</p></div>`;
        return;
      }

      grid.innerHTML = data.songs.map(song => createSongCard(song)).join('');
    } catch(e) {
      document.getElementById('results-grid').innerHTML = `<p style="color:var(--error)">Error: ${e.message}</p>`;
    }
  }

  function showDefaultView() {
    document.getElementById('default-view').style.display = 'block';
    document.getElementById('results-view').style.display = 'none';
  }

  // Filter by genre chip
  function filterByGenre(genre) {
    document.getElementById('search-input').value = genre;
    document.getElementById('clear-btn').style.display = 'block';
    performSearch(genre);
  }

  async function loadAll() {
    try {
      const data = await SongsAPI.getAll();
      allSongs = data.songs || [];

      // Render all songs grid
      const grid = document.getElementById('all-songs-grid');
      grid.innerHTML = allSongs.map(s => createSongCard(s)).join('');

      // Get unique genres and render chips + genre grid
      const genres = [...new Set(allSongs.map(s => s.genre).filter(Boolean))];
      renderGenreChips(genres);
      renderGenreGrid(genres);
    } catch(e) {
      document.getElementById('all-songs-grid').innerHTML = '<p style="color:var(--error)">Error loading songs</p>';
    }
  }

  function renderGenreChips(genres) {
    const el = document.getElementById('genre-chips');
    el.innerHTML = genres.map((g, i) => `
      <button onclick="filterByGenre('${escapeHtml(g)}')"
        style="padding:6px 16px;border-radius:50px;border:1px solid ${GENRE_COLORS[i%GENRE_COLORS.length]}33;background:${GENRE_COLORS[i%GENRE_COLORS.length]}11;color:${GENRE_COLORS[i%GENRE_COLORS.length]};font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;"
        onmouseover="this.style.background='${GENRE_COLORS[i%GENRE_COLORS.length]}22'"
        onmouseout="this.style.background='${GENRE_COLORS[i%GENRE_COLORS.length]}11'">
        ${escapeHtml(g)}
      </button>
    `).join('');
  }

  function renderGenreGrid(genres) {
    const emojis = { pop: '🎤', rock: '🎸', hip: '🎧', jazz: '🎷', classical: '🎻', electronic: '🎛', r: '🎶', country: '🤠', metal: '🤘', indie: '🌿' };
    const getEmoji = (g) => {
      const low = g.toLowerCase();
      for (const [key, emoji] of Object.entries(emojis)) {
        if (low.includes(key)) return emoji;
      }
      return '🎵';
    };
    const el = document.getElementById('genre-grid');
    el.innerHTML = genres.map((g, i) => `
      <div class="song-card" onclick="filterByGenre('${escapeHtml(g)}')" style="background: linear-gradient(135deg, ${GENRE_COLORS[i%GENRE_COLORS.length]}22, ${GENRE_COLORS[(i+1)%GENRE_COLORS.length]}11); border-color: ${GENRE_COLORS[i%GENRE_COLORS.length]}44">
        <div class="song-thumbnail" style="background:${GENRE_COLORS[i%GENRE_COLORS.length]}22">
          <div class="song-thumbnail-placeholder" style="font-size:44px">${getEmoji(g)}</div>
        </div>
        <div class="song-title">${escapeHtml(g)}</div>
        <div class="song-artist">${allSongs.filter(s=>s.genre===g).length} songs</div>
      </div>
    `).join('');
  }

  handleSongCardClick = (songId) => {
    const song = allSongs.find(s => s._id === songId) ||
                 Array.from(document.querySelectorAll('[data-song-id]')).map(el => ({ _id: el.dataset.songId })).find(s => s._id === songId);
    if (song && song.filePath) playSong(song, allSongs);
    else SongsAPI.getOne(songId).then(d => playSong(d.song, allSongs));
  };

  loadAll();
</script>
</body>
</html>
